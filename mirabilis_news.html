<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News – Mirabilis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;cursor:none;}
body{
  font-family:'Cormorant Garamond',serif;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 120% 80% at 0% 0%,rgba(249,232,240,0.95) 0%,transparent 55%),
    radial-gradient(ellipse 100% 70% at 100% 0%,rgba(237,232,249,0.9) 0%,transparent 50%),
    radial-gradient(ellipse 80% 60% at 50% 50%,rgba(232,246,243,0.7) 0%,transparent 55%),
    radial-gradient(ellipse 100% 70% at 0% 100%,rgba(232,243,251,0.85) 0%,transparent 50%),
    radial-gradient(ellipse 120% 80% at 100% 100%,rgba(253,240,232,0.95) 0%,transparent 55%);
  background-color:#fdf8f2;
}
.cursor-dot{
  position:fixed;width:7px;height:7px;background:#d4789a;border-radius:50%;
  pointer-events:none;z-index:10000;transform:translate(-50%,-50%);
  box-shadow:0 0 10px #d4789a;
}
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 40px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(253,248,242,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,168,75,0.2);
}
.nav-logo{
  font-family:'Uncial Antiqua',cursive;font-size:13px;letter-spacing:4px;
  background:linear-gradient(135deg,#d4789a,#a888cc,#6abaaa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-decoration:none;cursor:none;
}
.back-link{
  font-family:'EB Garamond',serif;font-size:12px;letter-spacing:3px;
  color:rgba(74,58,85,0.5);text-decoration:none;text-transform:uppercase;
  cursor:none;transition:color 0.3s;
}
.back-link:hover{color:#d4789a;}

.stage{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;
}

/* Floating petals */
.petal{
  position:fixed;pointer-events:none;z-index:2;
  animation:petalFall var(--dur) var(--delay) linear infinite;
  opacity:0;font-size:var(--size);top:-5%;left:var(--x);
}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(0) rotate(0deg) translateX(0);}
  8%{opacity:0.5;}85%{opacity:0.3;}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg) translateX(var(--drift));}
}

.ornament{
  font-size:11px;letter-spacing:8px;color:#c8a84b;opacity:0.6;
  font-family:'EB Garamond',serif;font-style:italic;margin-bottom:20px;
  animation:fadeIn 1.2s ease both;
}
.main-title{
  font-family:'Uncial Antiqua',cursive;
  font-size:clamp(36px,8vw,80px);
  letter-spacing:6px;
  background:linear-gradient(135deg,#f4a8c0,#c89ad4,#92c4e8,#80d4b8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;
  animation:fadeIn 1.4s ease both;
}
.divider{
  display:flex;align-items:center;gap:12px;margin:16px auto 24px;
  animation:fadeIn 1.6s ease both;
}
.divider-line{width:60px;height:1px;background:linear-gradient(to right,transparent,#c8a84b);}
.divider-line:last-child{background:linear-gradient(to left,transparent,#c8a84b);}

.coming-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(16px,2.5vw,22px);
  color:rgba(74,58,85,0.6);
  line-height:1.9;max-width:480px;
  animation:fadeIn 1.8s ease both;
  margin-bottom:32px;
}
.coming-en{
  font-size:clamp(12px,1.8vw,15px);
  color:rgba(74,58,85,0.35);letter-spacing:3px;
  font-style:italic;
  animation:fadeIn 2s ease both;
}

/* Hourglass SVG animation */
.hourglass-wrap{
  margin:32px auto;
  animation:fadeIn 2.2s ease both;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div>

<nav>
  <a class="nav-logo" href="mirabilis.html">Mirabilis</a>
  <a class="back-link" href="mirabilis.html">← Home</a>
</nav>

<div class="stage">
  <div class="ornament">✦ &nbsp; News &nbsp; ✦</div>
  <div class="main-title">News</div>
  <div class="divider">
    <div class="divider-line"></div>
    <span style="color:#c8a84b;font-size:14px;">✿</span>
    <div class="divider-line" style="background:linear-gradient(to right,#c8a84b,transparent);"></div>
    <div class="divider-line" style="background:linear-gradient(to left,#c8a84b,transparent);"></div>
    <span style="color:#c8a84b;font-size:14px;">✿</span>
    <div class="divider-line" style="background:linear-gradient(to left,transparent,#c8a84b);"></div>
  </div>

  <!-- Art nouveau hourglass / coming soon illustration -->
  <div class="hourglass-wrap">
    <svg width="80" height="110" viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f4a8c0" stop-opacity="0.7"/>
          <stop offset="50%" stop-color="#c89ad4" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#92c4e8" stop-opacity="0.7"/>
        </linearGradient>
      </defs>
      <!-- Hourglass frame -->
      <path d="M10 8 L70 8 L70 12 L45 52 L70 92 L70 96 L10 96 L10 92 L35 52 L10 12 Z"
            fill="none" stroke="rgba(200,168,75,0.5)" stroke-width="1.5"/>
      <!-- Top sand -->
      <path d="M12 12 L68 12 L44 50 L36 50 Z" fill="url(#hgGrad)" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.15;0.4" dur="3s" repeatCount="indefinite"/>
      </path>
      <!-- Bottom sand accumulating -->
      <path d="M36 54 L44 54 L66 90 L14 90 Z" fill="url(#hgGrad)" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.55;0.3" dur="3s" repeatCount="indefinite"/>
      </path>
      <!-- Sand particle falling -->
      <circle cx="40" cy="52" r="2" fill="rgba(200,168,75,0.6)">
        <animate attributeName="cy" values="30;70" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Top bar decoration -->
      <line x1="6" y1="8" x2="74" y2="8" stroke="rgba(200,168,75,0.6)" stroke-width="2"/>
      <line x1="6" y1="96" x2="74" y2="96" stroke="rgba(200,168,75,0.6)" stroke-width="2"/>
      <!-- Corner gems -->
      <circle cx="10" cy="8" r="3" fill="rgba(212,120,154,0.6)"/>
      <circle cx="70" cy="8" r="3" fill="rgba(168,136,204,0.6)"/>
      <circle cx="10" cy="96" r="3" fill="rgba(106,186,170,0.6)"/>
      <circle cx="70" cy="96" r="3" fill="rgba(200,168,75,0.6)"/>
      <!-- Side leaf ornaments -->
      <path d="M6 8 Q-2 30 6 52" stroke="rgba(200,168,75,0.3)" fill="none" stroke-width="0.8"/>
      <ellipse cx="3" cy="30" rx="5" ry="3" fill="rgba(106,186,170,0.2)" stroke="rgba(200,168,75,0.3)" stroke-width="0.5" transform="rotate(-15,3,30)"/>
      <path d="M74 8 Q82 30 74 52" stroke="rgba(200,168,75,0.3)" fill="none" stroke-width="0.8"/>
      <ellipse cx="77" cy="30" rx="5" ry="3" fill="rgba(212,120,154,0.2)" stroke="rgba(200,168,75,0.3)" stroke-width="0.5" transform="rotate(15,77,30)"/>
    </svg>
  </div>

  <p class="coming-text">
    ニュースページは只今準備中です。<br>
    最新情報はXでお知らせします。
  </p>
  <p class="coming-en">— Coming Soon —</p>
</div>

<script>
const dot=document.getElementById('cursorDot');
document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';});

const petals=['🌸','✿','❀','🌷'];
for(let i=0;i<12;i++){
  const p=document.createElement('div');p.className='petal';
  p.textContent=petals[Math.floor(Math.random()*petals.length)];
  const size=(10+Math.random()*10)+'px';
  p.style.cssText=`left:${Math.random()*100}%;--dur:${14+Math.random()*12}s;--size:${size};--drift:${(Math.random()-0.5)*100}px;animation-delay:${Math.random()*14}s;`;
  document.body.appendChild(p);
}
</script>
</body>
</html>
