<style>
:root {
  --cream: #fdf8f2;
  --parchment: #f8f2e8;
  --blush: #f9e8f0;
  --lavender: #ede8f9;
  --mint: #e8f6f3;
  --sky: #e8f3fb;
  --peach: #fdf0e8;
  --gold: #c8a84b;
  --deep-gold: #9a7a2a;
  --rose: #d4789a;
  --lilac: #a888cc;
  --teal: #6abaaa;
  --ink: #2a1f35;
  --ink-light: #4a3a55;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--cream);
  font-family:'Cormorant Garamond',serif;
  cursor:none;
  position:relative;
}

/* ── Pastel gradient bg ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 120% 80% at 0% 0%, rgba(249,232,240,0.95) 0%, transparent 55%),
    radial-gradient(ellipse 100% 70% at 100% 0%, rgba(237,232,249,0.9) 0%, transparent 50%),
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(232,246,243,0.7) 0%, transparent 55%),
    radial-gradient(ellipse 100% 70% at 0% 100%, rgba(232,243,251,0.85) 0%, transparent 50%),
    radial-gradient(ellipse 120% 80% at 100% 100%, rgba(253,240,232,0.95) 0%, transparent 55%);
  background-color:var(--cream);
}

/* ── Cursor ── */
.cursor-dot{
  position:fixed;width:7px;height:7px;
  background:var(--rose);border-radius:50%;
  pointer-events:none;z-index:10000;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px var(--rose),0 0 20px rgba(212,120,154,0.4);
}

/* ── Hamburger menu ── */
.menu-btn{
  position:fixed;top:28px;right:36px;z-index:1000;
  width:44px;height:44px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px;
  cursor:none;
  background:rgba(253,248,242,0.8);
  border:1px solid rgba(200,168,75,0.3);
  backdrop-filter:blur(8px);
  transition:all 0.3s;
}
.menu-btn:hover{background:rgba(249,232,240,0.9);border-color:var(--rose);}
.menu-btn span{
  display:block;width:22px;height:1px;
  background:var(--ink);
  transition:all 0.4s;
  transform-origin:center;
}
.menu-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* ── Overlay menu ── */
.menu-overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;
  background:
    radial-gradient(ellipse 120% 80% at 0% 0%, rgba(249,232,240,0.97) 0%, transparent 55%),
    radial-gradient(ellipse 100% 70% at 100% 0%, rgba(237,232,249,0.96) 0%, transparent 50%),
    radial-gradient(ellipse 100% 70% at 0% 100%, rgba(232,243,251,0.96) 0%, transparent 50%),
    radial-gradient(ellipse 120% 80% at 100% 100%, rgba(253,240,232,0.97) 0%, transparent 55%);
  background-color:rgba(253,248,242,0.97);
}
.menu-overlay.open{opacity:1;pointer-events:all;}

.menu-inner{text-align:center;position:relative;}

/* Art nouveau arch around menu */
.menu-arch{
  position:absolute;inset:-80px;pointer-events:none;
}

.menu-nav{list-style:none;display:flex;flex-direction:column;gap:8px;align-items:center;}
.menu-nav li{overflow:hidden;}
.menu-nav a{
  display:block;
  font-family:'Uncial Antiqua',cursive;
  font-size:clamp(28px,5vw,48px);
  letter-spacing:6px;
  text-decoration:none;
  background:linear-gradient(135deg,var(--rose),var(--lilac),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  transition:all 0.3s;cursor:none;
  transform:translateY(60px);opacity:0;
  transition:transform 0.5s ease, opacity 0.5s ease, filter 0.3s;
}
.menu-overlay.open .menu-nav a{transform:translateY(0);opacity:1;}
.menu-nav li:nth-child(1) a{transition-delay:0.1s;}
.menu-nav li:nth-child(2) a{transition-delay:0.18s;}
.menu-nav li:nth-child(3) a{transition-delay:0.26s;}
.menu-nav li:nth-child(4) a{transition-delay:0.34s;}
.menu-nav li:nth-child(5) a{transition-delay:0.42s;}
.menu-nav a:hover{filter:brightness(1.2) drop-shadow(0 0 8px rgba(212,120,154,0.5));}

.menu-logo{
  font-family:'Uncial Antiqua',cursive;font-size:13px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--rose),var(--lilac));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:48px;opacity:0;
  transition:opacity 0.5s ease 0.05s;
}
.menu-overlay.open .menu-logo{opacity:1;}

.menu-divider{
  width:120px;height:1px;margin:24px auto;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:0;transition:opacity 0.5s ease 0.5s;
}
.menu-overlay.open .menu-divider{opacity:0.5;}

.menu-social{
  display:flex;gap:24px;justify-content:center;margin-top:8px;
  opacity:0;transition:opacity 0.5s ease 0.55s;
}
.menu-overlay.open .menu-social{opacity:1;}
.menu-social a{
  font-family:'EB Garamond',serif;font-size:11px;letter-spacing:3px;
  color:var(--ink-light);text-decoration:none;text-transform:uppercase;
  transition:color 0.3s;cursor:none;opacity:0.5;
}
.menu-social a:hover{color:var(--rose);opacity:1;}

/* ── Site logo top-left ── */
.site-logo{
  position:fixed;top:28px;left:36px;z-index:1000;
  font-family:'Uncial Antiqua',cursive;font-size:15px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--rose),var(--lilac),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  cursor:none;
}

/* ── Main stage ── */
#stage{
  position:fixed;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
}

/* ── Artist photo with Mucha frame ── */
.mucha-container{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity 1.2s ease;
  padding-bottom:20px;
}
.mucha-container.visible{opacity:1;}

.photo-frame{
  position:relative;
  width:min(300px, 78vw);
  /* padding for tarot-style top/bottom banners */
  padding: 56px 16px;
}
.photo-frame img{
  width:100%;
  display:block;
  position:relative;
  z-index:2;
}

/* SVG frame overlay - covers entire padded container */
.frame-svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:3;
  pointer-events:none;
}

/* Bottom title plate */
.title-plate{
  position:absolute;
  bottom:0px;left:50%;transform:translateX(-50%);
  text-align:center;z-index:4;
  white-space:nowrap;
  width:100%;
  padding-bottom:6px;
}
.title-plate-name{
  font-family:'Uncial Antiqua',cursive;
  font-size:clamp(20px,4vw,32px);
  letter-spacing:6px;
  background:linear-gradient(135deg,#f4a8c0,#c89ad4,#92c4e8,#80d4b8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title-plate-sub{
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:11px;letter-spacing:5px;color:var(--deep-gold);
  margin-top:4px;
}

/* scroll hint */
.scroll-hint{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:10;font-family:'EB Garamond',serif;font-style:italic;
  font-size:11px;letter-spacing:4px;color:var(--ink-light);opacity:0;
  transition:opacity 1s ease 2.5s;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.scroll-hint.visible{opacity:0.45;}
.scroll-hint::after{
  content:'';display:block;width:1px;height:32px;
  background:linear-gradient(to bottom,var(--gold),transparent);
  animation:scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse{0%,100%{opacity:0.3;transform:scaleY(1);}50%{opacity:0.8;transform:scaleY(1.1);}}
