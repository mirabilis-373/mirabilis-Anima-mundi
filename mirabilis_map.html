<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;}
body{background:#1a1008;font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;align-items:center;}


50%{transform:translate(-50%,-95%) rotate(4deg);}}

65%,88%{transform:translateY(8%);}76%{transform:translateY(-4%);}}

nav{position:fixed;top:0;left:0;right:0;z-index:300;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(26,16,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,168,75,0.2);}
.nav-logo{font-family:'Uncial Antiqua',cursive;font-size:13px;letter-spacing:4px;background:linear-gradient(135deg,#d4789a,#a888cc,#6abaaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;cursor:none;}
.back-link{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-decoration:none;text-transform:uppercase;cursor:none;transition:color 0.3s;}
.back-link:hover{color:#d4789a;}

/* Language toggle */
.lang-toggle{
  display:flex;gap:0;
}
.lang-btn{
  font-family:'EB Garamond',serif;font-size:11px;letter-spacing:2px;
  padding:4px 12px;border:1px solid rgba(200,168,75,0.4);
  background:rgba(26,16,8,0.6);color:rgba(200,168,75,0.5);
  cursor:none;transition:all 0.3s;text-transform:uppercase;
}
.lang-btn:first-child{border-right:none;}
.lang-btn.active{background:rgba(200,168,75,0.2);color:rgba(200,168,75,1);}
.lang-btn:hover{color:rgba(200,168,75,0.9);}

/* Page header */
.page-header{margin-top:72px;padding:24px 20px 12px;text-align:center;}
.page-header h1{font-family:'Uncial Antiqua',cursive;font-size:clamp(22px,4vw,36px);letter-spacing:6px;background:linear-gradient(135deg,#f4a8c0,#c89ad4,#92c4e8,#c8a84b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-header p{font-family:'EB Garamond',serif;font-style:italic;font-size:11px;letter-spacing:4px;color:rgba(200,168,75,0.45);margin-top:5px;}

.map-hint{text-align:center;padding:0 20px 16px;font-family:'EB Garamond',serif;font-style:italic;font-size:11px;letter-spacing:3px;color:rgba(200,168,75,0.35);}

/* Map container */
.map-container{position:relative;width:min(98vw,1000px);margin:0 auto 60px;filter:drop-shadow(0 8px 40px rgba(0,0,0,0.7));}
.map-container img.map-img{width:100%;height:auto;display:block;border:2px solid rgba(140,100,50,0.5);}

/* Markers */
.loc-marker{position:absolute;transform:translate(-50%,-50%);cursor:none;z-index:10;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.loc-dot{width:8px;height:8px;border-radius:50%;background:rgba(220,180,90,0.9);border:1px solid rgba(255,255,255,0.5);box-shadow:0 0 4px rgba(200,168,75,0.7),0 0 8px rgba(200,168,75,0.4);transition:all 0.25s;animation:markerPulse 2.5s ease-in-out infinite;}
.loc-marker:hover .loc-dot{background:rgba(225,110,160,0.95);box-shadow:0 0 8px rgba(212,120,154,0.9),0 0 16px rgba(212,120,154,0.5);transform:scale(1.5);}
@keyframes markerPulse{0%,100%{box-shadow:0 0 4px rgba(200,168,75,0.6),0 0 8px rgba(200,168,75,0.3);}50%{box-shadow:0 0 8px rgba(200,168,75,0.9),0 0 16px rgba(200,168,75,0.5);}}

/* Hover popup — fixed bottom center */
.popup{
  position:fixed;z-index:500;
  left:50%;bottom:24px;
  transform:translateX(-50%) translateY(10px);
  width:min(88vw,340px);
  background:rgba(26,16,8,0.97);
  border:1px solid rgba(200,168,75,0.5);
  padding:18px 22px;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s ease,transform 0.2s ease;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}
.popup::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(200,168,75,0.8),transparent);}
.popup.show{opacity:1;transform:translateX(-50%) translateY(0);}
.popup-song{font-family:'Uncial Antiqua',cursive;font-size:16px;letter-spacing:2px;background:linear-gradient(135deg,#f4a8c0,#c89ad4,#92c4e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;line-height:1.3;}
.popup-desc{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.8;font-style:italic;}
</style>

<!-- Single shared popup -->
<div class="popup" id="popup">
  <div class="popup-song" id="popupSong"></div>
  <div class="popup-desc" id="popupDesc"></div>
</div>

<script>


let currentLang='en';
const locations=[{"name": "Yuluwirri Plains", "song_en": "Yuluwirri Bird", "song_ja": "Yuluwirri Bird", "desc_en": "Inspired by the Dreamtime of the Aboriginal peoples. Awakening to colour, carrying colour.", "desc_ja": "アボリジナルピープルのドリームタイムから着想。色を運ぶ、色に気づく。", "x": 17.1, "y": 50.7}, {"name": "Quiet Mountain", "song_en": "Quiet Mountain's Call", "song_ja": "Quiet Mountain's Call", "desc_en": "A perspective taught by nature.", "desc_ja": "自然から教わる視点。", "x": 21.8, "y": 29.0}, {"name": "Winddancer Plains", "song_en": "Winddancer", "song_ja": "Winddancer", "desc_en": "Inspired by Apache oral tradition. Cycle.", "desc_ja": "アパッチ族の口伝から着想。循環。", "x": 49.7, "y": 28.0}, {"name": "Particle Peaks", "song_en": "Particle Whisper", "song_ja": "Particle Whisper", "desc_en": "Inspired by quantum mechanics. The universe, particles, and the connections of the soul.", "desc_ja": "量子力学からの着想。宇宙、粒子、魂のつながり。", "x": 74.9, "y": 27.8}, {"name": "Cocoon Vale", "song_en": "Cocoon Glimmer", "song_ja": "Cocoon Glimmer", "desc_en": "Inspired by the metamorphosis of a butterfly. The colour within.", "desc_ja": "蝶のメタモルフォーゼから着想。内なる色。", "x": 50.1, "y": 58.1}, {"name": "Kan-u Valley", "song_en": "甘雨 Kan-u", "song_ja": "甘雨 Kan-u", "desc_en": "Inspired by the Miko dance. Prayer and gratitude.", "desc_ja": "巫女舞から着想、祈りと感謝。", "x": 79.8, "y": 52.7}, {"name": "K'riki Highlands", "song_en": "K'riki Fire", "song_ja": "K'riki Fire", "desc_en": "Inspired by the legend of the hummingbird in South America.", "desc_ja": "南米のハチドリの雫、ハチドリの伝説から着想。", "x": 23.6, "y": 89.8}, {"name": "Nature's Spring", "song_en": "Nature's Prayer", "song_ja": "Nature's Prayer", "desc_en": "Inspired by the water cycle. Purification and prayer.", "desc_ja": "水循環から着想、浄化と祈り。", "x": 49.7, "y": 92.8}, {"name": "Brigid's Flame", "song_en": "Tear of Brigid's Flame", "song_ja": "Tear of Brigid's Flame", "desc_en": "The Celtic goddess of flame. That which we pursue.", "desc_ja": "ケルトの炎の女神、追い求めるもの。", "x": 50.1, "y": 77.1}, {"name": "Tidal Sea", "song_en": "Singing Through the Tides", "song_ja": "Singing Through the Tides", "desc_en": "Inspired by the song of the whale. A song that illuminates the deep sea.", "desc_ja": "クジラの歌声から着想、深海を照らす歌。", "x": 71.0, "y": 87.9}];
const popup=document.getElementById('popup');
const popupSong=document.getElementById('popupSong');
const popupDesc=document.getElementById('popupDesc');

function setLang(lang){
  currentLang=lang;
  document.getElementById('btnEn').classList.toggle('active',lang==='en');
  document.getElementById('btnJa').classList.toggle('active',lang==='ja');
  document.getElementById('headerSub').textContent=lang==='en'?'The World of Mirabilis':'ミラビリスの世界';
  document.getElementById('mapHint').textContent=lang==='en'?'✦   hover or tap a location   ✦':'✦   地名をタップすると曲の説明が現れます   ✦';
}

const container=document.getElementById('mapContainer');
let hideTimer=null;

locations.forEach(loc=>{
  const marker=document.createElement('div');
  marker.className='loc-marker';
  marker.style.left=loc.x+'%';
  marker.style.top=loc.y+'%';
  const dot2=document.createElement('div');
  dot2.className='loc-dot';
  marker.appendChild(dot2);
  container.appendChild(marker);

  function showPopup(){
    clearTimeout(hideTimer);
    popupSong.textContent=currentLang==='en'?loc.song_en:loc.song_ja;
    popupDesc.textContent=currentLang==='en'?loc.desc_en:loc.desc_ja;
    popup.classList.add('show');
  }
  function hidePopup(){
    hideTimer=setTimeout(()=>popup.classList.remove('show'),120);
  }

  // Desktop hover
  marker.addEventListener('mouseenter',showPopup);
  marker.addEventListener('mouseleave',hidePopup);

  // Mobile tap
  marker.addEventListener('touchstart',e=>{e.preventDefault();showPopup();},{passive:false});
  marker.addEventListener('touchend',e=>{e.preventDefault();setTimeout(()=>popup.classList.remove('show'),2500);},{passive:false});
});

// Click outside to close on mobile
document.addEventListener('click',e=>{
  if(!e.target.closest('.loc-marker')) popup.classList.remove('show');
});
</script>
</body>
</html>
