/* Menu button */
.menu-btn{width:44px;height:44px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:7px;cursor:none;background:rgba(253,248,242,0.92);border:1px solid rgba(200,168,75,0.6);backdrop-filter:blur(8px);transition:all 0.3s;box-shadow:0 2px 12px rgba(200,168,75,0.2);}
.menu-btn:hover{background:rgba(245,215,230,1);border-color:var(--rose);}
.menu-btn span{display:block;width:22px;height:2px;background:var(--ink);transition:all 0.4s;transform-origin:center;flex-shrink:0;}
.menu-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* Menu overlay */
.menu-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.5s ease;background:rgba(253,248,242,0.97);}
.menu-overlay.open{opacity:1;pointer-events:all;}
.menu-logo{font-family:'Uncial Antiqua',cursive;font-size:13px;letter-spacing:5px;background:linear-gradient(135deg,var(--rose),var(--lilac),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:48px;opacity:0;transition:opacity 0.5s ease 0.05s;}
.menu-overlay.open .menu-logo{opacity:1;}
.menu-nav{list-style:none;display:flex;flex-direction:column;gap:8px;align-items:center;}
.menu-nav a{display:block;font-family:'Uncial Antiqua',cursive;font-size:clamp(28px,5vw,48px);letter-spacing:6px;text-decoration:none;background:linear-gradient(135deg,var(--rose),var(--lilac),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:none;transform:translateY(60px);opacity:0;transition:transform 0.5s ease,opacity 0.5s ease;}
.menu-overlay.open .menu-nav a{transform:translateY(0);opacity:1;}
.menu-nav li:nth-child(1) a{transition-delay:0.1s;}
.menu-nav li:nth-child(2) a{transition-delay:0.18s;}
.menu-nav li:nth-child(3) a{transition-delay:0.26s;}
.menu-nav li:nth-child(4) a{transition-delay:0.34s;}
.menu-nav li:nth-child(5) a{transition-delay:0.42s;}
.menu-divider{width:120px;height:1px;margin:24px auto;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0;transition:opacity 0.5s ease 0.5s;}
.menu-overlay.open .menu-divider{opacity:0.5;}
.menu-social{display:flex;gap:24px;justify-content:center;margin-top:8px;opacity:0;transition:opacity 0.5s ease 0.55s;}
.menu-overlay.open .menu-social{opacity:1;}
.menu-social a{font-family:'EB Garamond',serif;font-size:11px;letter-spacing:3px;color:var(--ink-light);text-decoration:none;text-transform:uppercase;transition:color 0.3s;cursor:none;opacity:0.5;}
.menu-social a:hover{color:var(--rose);opacity:1;}

.site-logo{position:fixed;top:28px;left:28px;z-index:1000;font-family:'Uncial Antiqua',cursive;font-size:14px;letter-spacing:4px;background:linear-gradient(135deg,var(--rose),var(--lilac),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:none;}

/* Stage */
#stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}

/* Art Nouveau side vines */
.stage-arch{position:absolute;inset:0;pointer-events:none;overflow:hidden;}

/* Main content */
.main-content{position:relative;z-index:2;opacity:0;transition:opacity 1.4s ease;display:flex;flex-direction:column;align-items:center;}
.main-content.visible{opacity:1;}
.top-ornament{font-family:'EB Garamond',serif;font-style:italic;font-size:11px;letter-spacing:8px;color:var(--gold);opacity:0.7;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.top-ornament::before,.top-ornament::after{content:'';height:1px;width:50px;background:linear-gradient(to right,transparent,var(--gold));}
.top-ornament::after{background:linear-gradient(to left,transparent,var(--gold));}

.main-title{
  font-family:'Uncial Antiqua',cursive;
  font-size:clamp(48px,11vw,128px);
  font-weight:400;line-height:1;letter-spacing:8px;
  background:linear-gradient(135deg,#f4a8c0 0%,#c89ad4 25%,#92c4e8 50%,#80d4b8 70%,#c8a84b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 24px rgba(200,154,212,0.3));
  margin-bottom:12px;
}
.title-divider{display:flex;align-items:center;gap:14px;margin:14px 0;}
.title-divider-line{width:70px;height:1px;background:linear-gradient(to right,transparent,var(--gold));}
.title-divider-line:last-child{background:linear-gradient(to left,transparent,var(--gold));}
.title-divider-gem{color:var(--gold);font-size:16px;}
.main-subtitle{font-family:'Cinzel',serif;font-size:clamp(10px,2vw,14px);letter-spacing:10px;color:var(--deep-gold);text-transform:uppercase;margin-bottom:10px;opacity:0.8;}
.main-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(13px,2vw,18px);color:var(--ink-light);opacity:0.6;line-height:1.9;max-width:460px;margin-top:8px;}

/* Feather */
.feather-img{position:fixed;pointer-events:none;z-index:5;top:-10%;opacity:0;}
@keyframes featherDrop{0%{opacity:0;transform:translateY(0) rotate(0deg);}8%{opacity:1;}88%{opacity:0.8;}100%{opacity:0;transform:translateY(115vh) rotate(var(--spin));}}

.lang-toggle{display:flex;flex-direction:row;gap:0;flex-shrink:0;}
.lang-btn{font-family:'EB Garamond',serif;font-size:10px;letter-spacing:1.5px;padding:4px 9px;border:1px solid rgba(200,168,75,0.35);background:rgba(253,248,242,0.8);color:rgba(154,122,42,0.6);cursor:none;transition:all 0.3s;text-transform:uppercase;white-space:nowrap;}
.lang-btn:first-child{border-right:none;}
.lang-btn.active{background:rgba(200,168,75,0.15);color:rgba(154,122,42,1);}

.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:1200;
  padding:12px 20px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(253,248,242,0.88);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,168,75,0.2);
}

.nav-links{list-style:none;display:flex;gap:clamp(8px,1.8vw,24px);align-items:center;flex-shrink:1;}
.nav-links a{font-family:'EB Garamond',serif;font-size:clamp(9px,1.2vw,12px);letter-spacing:1.5px;color:var(--ink-light);text-decoration:none;text-transform:uppercase;transition:color 0.3s;cursor:none;opacity:0.7;white-space:nowrap;}
.nav-links a:hover{color:var(--rose);opacity:1;}
</style>
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div>
<div class="bird-cursor" id="birdCursor"></div>



<nav class="top-nav">
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btnJa" onclick="setLang('ja')">日本語</button>
  </div>
  <ul class="nav-links">
    <li><a href="mirabilis_news.html">News</a></li>
    <li><a href="mirabilis_about.html" id="navAbout">About</a></li>
    <li><a href="mirabilis_music.html">Music</a></li>
    <li><a href="mirabilis_map.html" id="navMap">Map</a></li>
  </ul>
</nav>

    <nav>
      <ul class="menu-nav">
        <li><a href="mirabilis_news.html">News</a></li>

      </ul>
    </nav>

  </div>
</div>

<div id="stage">
  <div class="stage-arch">
    <svg viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;opacity:0.15;">
      <g stroke="rgba(200,168,75,0.8)" fill="none" stroke-width="1">
        <path d="M80 900 Q60 700 100 500 Q140 300 80 100"/>
        <ellipse cx="70" cy="700" rx="18" ry="12" fill="rgba(196,104,154,0.15)"/>
        <ellipse cx="55" cy="550" rx="15" ry="9" fill="rgba(106,186,170,0.15)"/>

        <ellipse cx="220" cy="28" rx="18" ry="11" fill="rgba(196,104,154,0.1)"/>
      </g>
      <g stroke="rgba(200,168,75,0.8)" fill="none" stroke-width="1" transform="scale(-1,1) translate(-1200,0)">
        <path d="M80 900 Q60 700 100 500 Q140 300 80 100"/>
        <ellipse cx="70" cy="700" rx="18" ry="12" fill="rgba(196,104,154,0.15)"/>
        <ellipse cx="55" cy="550" rx="15" ry="9" fill="rgba(106,186,170,0.15)"/>
        <ellipse cx="62" cy="380" rx="14" ry="8" fill="rgba(168,136,204,0.15)"/>
        <path d="M80 100 Q200 20 400 10"/>
      </g>
      <circle cx="600" cy="38" r="6" fill="rgba(200,168,75,0.4)"/>
      <line x1="550" y1="38" x2="588" y2="38" stroke="rgba(200,168,75,0.3)" stroke-width="1"/>
      <line x1="612" y1="38" x2="650" y2="38" stroke="rgba(200,168,75,0.3)" stroke-width="1"/>
    </svg>
  </div>

  <div class="main-content" id="mainContent">
    <div class="top-ornament">✦ &nbsp; Anima Mundi &nbsp; ✦</div>
    <h1 class="main-title">MIRABILIS</h1>
    <div class="title-divider">
      <div class="title-divider-line"></div>
      <span class="title-divider-gem">✿</span>
      <div class="title-divider-line" style="background:linear-gradient(to right,var(--gold),transparent);"></div>
      <div class="title-divider-line" style="background:linear-gradient(to left,var(--gold),transparent);"></div>
      <span class="title-divider-gem">✿</span>
      <div class="title-divider-line" style="background:linear-gradient(to left,transparent,var(--gold));"></div>
    </div>
    <div class="main-subtitle">Anima Mundi</div>
    
  </div>
</div>

  dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
  bird.style.left=e.clientX+'px';bird.style.top=e.clientY+'px';
});

// Launch burst then reveal
let count=0;
const burst=setInterval(()=>{
  launchFeather();
  count++;
  if(count>=28) clearInterval(burst);
},100);

setTimeout(()=>{
  document.getElementById('mainContent').classList.add('visible');
  // Continuous gentle feathers
  setInterval(launchFeather,2000);
},3200);

function setLang(lang){
  document.getElementById('btnEn').classList.toggle('active',lang==='en');
  document.getElementById('btnJa').classList.toggle('active',lang==='ja');
  const nm=document.getElementById('navMap');
  if(nm) nm.textContent=lang==='en'?'Map':'地図';
  // Store preference
  
  const tagline=document.getElementById('mainTagline');
  if(tagline){
    tagline.innerHTML=lang==='en'
      ?'Where ancient myths breathe through sound,<br>and the soul remembers what the world once knew.'
      :'神話と自然の息吹が音楽となる。<br>魂が、世界の記憶を呼び覚ます。';
  }
}
